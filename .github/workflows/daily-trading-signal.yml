name: Daily Trading Signal Email

on:
  schedule:
    # 2:28 PM Beijing time (UTC+8) = 06:28 UTC, weekdays only
    # NOTE: Use non-standard minute (:28) to avoid GitHub Actions congestion
    # at :00, :15, :30, :45 marks which can cause skipped runs.
    - cron: '28 6 * * 1-5'
  workflow_dispatch:  # Allow manual trigger for testing

jobs:
  send-signal:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync

      - name: Send daily trading signal email
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
        run: uv run python scripts/send_daily_signal.py
        id: send
        continue-on-error: true

      - name: Retry on failure
        if: steps.send.outcome == 'failure'
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
        run: |
          sleep 60
          uv run python scripts/send_daily_signal.py
